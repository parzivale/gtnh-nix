{
    # Top-level OpenComputers-style config

    # CPU configuration
    computer {
        # How fast the CPU runs (hz)
        cpuSpeed = 1000
        # Allow multi-threaded execution
        threaded = true
    }

    # GPU configuration
    gpu {
        bitsPerPixel = 8
        maxResolution = [ 160, 50 ]
    }

    // Networking section uses // comments
    network {
        enabled = true
        port: 25565
    }
}
